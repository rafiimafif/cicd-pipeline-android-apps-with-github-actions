name: Android CI and CD

on:
  push:
    branches: 
      - main
      - qa
      - develop
  pull_request:
    branches: 
      - main
      - qa

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      CURRENT_DATE_TIME: ${{ steps.date.outputs.current_date_time }}
    env:
      WORKING_DIR: android-demo-app

    steps:
    - name: Check out Git Repository
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ${{ env.WORKING_DIR }}

    - name: Gradle Clean
      run: ./gradlew clean
      working-directory: ${{ env.WORKING_DIR }}

    - name: Gradle Lint
      run: ./gradlew lint
      working-directory: ${{ env.WORKING_DIR }}

    - name: Gradle Build and generating apk files
      run: ./gradlew build
      working-directory: ${{ env.WORKING_DIR }}

    - name: Code Coverage test - Jacoco
      run: ./gradlew jacocoTestReport || ./gradlew test
      working-directory: ${{ env.WORKING_DIR }}
      continue-on-error: true

    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Set up JDK 17 for SonarCloud Scanner
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Code Scan Analysis - SonarCloud
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew sonarqube -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.coverage.exclusions="**/MyApplication.kt"
      working-directory: ${{ env.WORKING_DIR }}

    - name: Date and Time
      id: date
      run: echo "current_date_time=$(date +"%d-%m-%Y-%H-%I-%M-%S")" >> $GITHUB_OUTPUT

    - name: Copy APK files to a directory
      run: |
        mkdir -p apk-files/debug apk-files/release

        cp ${{ github.workspace }}/${{ env.WORKING_DIR }}/app/build/outputs/apk/dev/debug/app-dev-debug.apk \
           ${{ github.workspace }}/apk-files/debug/app-debug.apk
        mv ${{ github.workspace }}/apk-files/debug/app-debug.apk \
           ${{ github.workspace }}/apk-files/debug/app-debug-${{ steps.date.outputs.current_date_time }}.apk

        cp ${{ github.workspace }}/${{ env.WORKING_DIR }}/app/build/outputs/apk/prod/release/app-prod-release-unsigned.apk \
           ${{ github.workspace }}/apk-files/release/app-release-unsigned.apk
        mv ${{ github.workspace }}/apk-files/release/app-release-unsigned.apk \
           ${{ github.workspace }}/apk-files/release/app-release-unsigned-${{ steps.date.outputs.current_date_time }}.apk

    - name: Upload apk-files Directory
      uses: actions/upload-artifact@v4
      with:
        name: apk-files-artifactory
        path: ${{ github.workspace }}/apk-files/
        if-no-files-found: ignore



  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/main'

    steps:
    - name: Check out Git Repository
      uses: actions/checkout@v3

    - name: Download apk-files Artifactory
      uses: actions/download-artifact@v4
      with:
        name: apk-files-artifactory
        path: ${{ github.workspace }}/apk-files/

    - name: Display structure of downloaded files
      run: ls -R
      working-directory: ${{ github.workspace }}/apk-files/

    - name: Set up JFrog CLI
      uses: jfrog/setup-jfrog-cli@v3
      with:
        version: latest
      env:
        JF_URL: ${{ secrets.JF_URL }}
        JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

    - name: Organise APKs by branch folder
      run: |
        BRANCH="${{ github.ref_name }}"
        cd ${{ github.workspace }}/apk-files
        mkdir -p "$BRANCH"
        mv debug/ "$BRANCH/"
        mv release/ "$BRANCH/"

    - name: Upload APK files to JFrog Artifactory
      run: |
        BRANCH="${{ github.ref_name }}"
        TIMESTAMP="${{ needs.build.outputs.CURRENT_DATE_TIME }}"
        jf rt upload "apk-files/$BRANCH/debug/app-debug-$TIMESTAMP.apk" "android-artifact/$BRANCH/debug/"
        jf rt upload "apk-files/$BRANCH/release/app-release-unsigned-$TIMESTAMP.apk" "android-artifact/$BRANCH/release/"

